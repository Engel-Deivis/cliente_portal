<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mis Pedidos — ClientePortal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236366f1'/></svg>" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/estilos.css" />
  <style>
    .grid-pedidos { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:20px; }
    .tarjeta-pedido { background:var(--fondo-tarjeta); border:1px solid var(--borde); border-radius:var(--radio-lg); overflow:hidden; transition:var(--transicion); }
    .tarjeta-pedido:hover { border-color:var(--borde-hover); transform:translateY(-2px); box-shadow:var(--sombra); }
    .cabecera-pedido { padding:18px 20px; border-bottom:1px solid var(--borde); display:flex; justify-content:space-between; align-items:flex-start; gap:12px; }
    .cuerpo-pedido { padding:20px; }
    .barra-progreso-pedido { height:6px; background:var(--borde); border-radius:999px; overflow:hidden; margin-bottom:6px; }
    .relleno-progreso { height:100%; background:linear-gradient(90deg,var(--primario),var(--secundario)); border-radius:999px; transition:width 0.8s ease; }
    .lista-productos-pedido { list-style:none; margin:12px 0; display:flex; flex-direction:column; gap:6px; }
    .lista-productos-pedido li { display:flex; justify-content:space-between; font-size:13px; color:var(--texto-secundario); padding:6px 10px; background:var(--fondo-tarjeta); border-radius:var(--radio-sm); }
    .lista-productos-pedido li .producto-precio { color:var(--texto-principal); font-weight:600; }
    .boton-ver-timeline { display:flex; align-items:center; justify-content:center; gap:8px; width:100%; padding:10px; background:none; border:1px solid var(--borde); border-radius:var(--radio); color:var(--texto-secundario); font-family:var(--fuente); font-size:13px; cursor:pointer; transition:var(--transicion); margin-top:14px; }
    .boton-ver-timeline:hover { background:var(--primario-claro); border-color:var(--borde-activo); color:var(--primario); }
    @media (max-width:600px) { .grid-pedidos { grid-template-columns:1fr; } }
  </style>
</head>
<body>

  <div class="overlay-sidebar" id="overlay-sidebar"></div>

  <div class="app-contenedor">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar-principal">
      <div class="sidebar-logo">
        <div class="icono-logo"><i class="fa-solid fa-layer-group"></i></div>
        <div class="texto-logo">
          <div class="nombre-logo">ClientePortal</div>
          <div class="version-logo">v1.0 &middot; Portafolio</div>
        </div>
      </div>
      <div class="sidebar-usuario">
        <div class="avatar-usuario" id="perfil-avatar">??</div>
        <div class="info-perfil">
          <div class="nombre-perfil" id="perfil-nombre">Cargando...</div>
          <div class="empresa-perfil" id="perfil-empresa">—</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <span class="nav-seccion-titulo">Menú principal</span>
        <a href="dashboard.html" class="nav-enlace"><span class="nav-icono"><i class="fa-solid fa-chart-line"></i></span><span class="nav-texto">Dashboard</span></a>
        <a href="facturas.html"  class="nav-enlace"><span class="nav-icono"><i class="fa-solid fa-file-invoice-dollar"></i></span><span class="nav-texto">Mis Facturas</span></a>
        <a href="pedidos.html"   class="nav-enlace"><span class="nav-icono"><i class="fa-solid fa-boxes-stacked"></i></span><span class="nav-texto">Mis Pedidos</span></a>
        <a href="chat.html"      class="nav-enlace"><span class="nav-icono"><i class="fa-solid fa-headset"></i></span><span class="nav-texto">Soporte</span></a>
      </nav>
      <div class="sidebar-footer">
        <button class="boton-cerrar-sesion" id="boton-cerrar-sesion">
          <i class="fa-solid fa-right-from-bracket"></i><span>Cerrar sesión</span>
        </button>
      </div>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="contenido-principal">

      <header class="header-pagina">
        <div class="titulo-pagina">
          <button class="boton-menu-movil" id="boton-menu-movil" aria-label="Abrir menú">
            <i class="fa-solid fa-bars"></i>
          </button>
          <h1>Mis Pedidos</h1>
        </div>
        <div class="header-acciones">
          <select class="filtro-select" id="filtro-pedido-estado" aria-label="Filtrar pedidos">
            <option value="">Todos los pedidos</option>
            <option value="en-proceso">En proceso</option>
            <option value="enviado">Enviados</option>
            <option value="en-transito">En tránsito</option>
            <option value="entregado">Entregados</option>
          </select>
        </div>
      </header>

      <div class="pagina-scroll">
        <div class="grid-estadisticas" id="estadisticas-pedidos" style="margin-bottom:28px;"></div>
        <div class="grid-pedidos" id="grid-pedidos"></div>
        <div id="sin-pedidos" class="estado-vacio tarjeta" style="display:none;">
          <div class="icono-vacio"><i class="fa-solid fa-boxes-stacked"></i></div>
          <h3>Sin pedidos</h3>
          <p>No hay pedidos que coincidan con el filtro seleccionado.</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Modal timeline -->
  <div class="overlay-modal" id="overlay-modal-pedido">
    <div class="modal" role="dialog" aria-modal="true" aria-labelledby="titulo-modal-pedido">
      <div class="modal-cabecera">
        <h3 id="titulo-modal-pedido">Seguimiento del Pedido</h3>
        <button class="boton-cerrar-modal" id="cerrar-modal-pedido" aria-label="Cerrar">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal-cuerpo" id="cuerpo-modal-pedido"></div>
    </div>
  </div>

  <div id="contenedor-toast" aria-live="polite"></div>
  <script src="js/datos.js"></script>
  <script src="js/autenticacion.js"></script>
  <script src="js/pedidos.js"></script>
</body>
</html>
