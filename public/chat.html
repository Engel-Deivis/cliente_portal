<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Soporte — ClientePortal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%236366f1'/></svg>" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="css/estilos.css" />
  <style>
    .info-agente { display:flex; align-items:center; gap:12px; padding:14px 20px; background:var(--fondo-tarjeta); border:1px solid var(--borde); border-radius:var(--radio-lg) var(--radio-lg) 0 0; border-bottom:none; }
    .agente-estado { display:flex; align-items:center; gap:6px; font-size:12px; color:var(--exito); }
    .agente-estado::before { content:''; width:7px; height:7px; background:var(--exito); border-radius:50%; box-shadow:0 0 0 2px var(--exito-claro); }
    .sugerencias-rapidas { display:flex; flex-wrap:wrap; gap:8px; padding:10px 16px; background:var(--fondo-panel); border:1px solid var(--borde); border-top:none; }
    .sugerencia { padding:6px 14px; background:var(--fondo-tarjeta-hover); border:1px solid var(--borde); border-radius:999px; font-size:12px; color:var(--texto-secundario); cursor:pointer; transition:var(--transicion); white-space:nowrap; }
    .sugerencia:hover { background:var(--primario-claro); border-color:var(--borde-activo); color:var(--primario); }
    .separador-fecha { display:flex; align-items:center; gap:12px; font-size:11px; color:var(--texto-suave); margin:8px 0; }
    .separador-fecha::before, .separador-fecha::after { content:''; flex:1; height:1px; background:var(--borde); }
    /* Ícono de FA dentro del avatar del chat */
    .avatar-chat i { font-size:14px; }
  </style>
</head>
<body>

  <div class="overlay-sidebar" id="overlay-sidebar"></div>

  <div class="app-contenedor">

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar-principal">
      <div class="sidebar-logo">
        <div class="icono-logo"><i class="fa-solid fa-layer-group"></i></div>
        <div class="texto-logo">
          <div class="nombre-logo">ClientePortal</div>
          <div class="version-logo">v1.0 &middot; Portafolio</div>
        </div>
      </div>
      <div class="sidebar-usuario">
        <div class="avatar-usuario" id="perfil-avatar">??</div>
        <div class="info-perfil">
          <div class="nombre-perfil" id="perfil-nombre">Cargando...</div>
          <div class="empresa-perfil" id="perfil-empresa">—</div>
        </div>
      </div>
      <nav class="sidebar-nav">
        <span class="nav-seccion-titulo">Menú principal</span>
        <a href="dashboard.html" class="nav-enlace"><span class="nav-icono"><i class="fa-solid fa-chart-line"></i></span><span class="nav-texto">Dashboard</span></a>
        <a href="facturas.html"  class="nav-enlace"><span class="nav-icono"><i class="fa-solid fa-file-invoice-dollar"></i></span><span class="nav-texto">Mis Facturas</span></a>
        <a href="pedidos.html"   class="nav-enlace"><span class="nav-icono"><i class="fa-solid fa-boxes-stacked"></i></span><span class="nav-texto">Mis Pedidos</span></a>
        <a href="chat.html"      class="nav-enlace"><span class="nav-icono"><i class="fa-solid fa-headset"></i></span><span class="nav-texto">Soporte</span></a>
      </nav>
      <div class="sidebar-footer">
        <button class="boton-cerrar-sesion" id="boton-cerrar-sesion">
          <i class="fa-solid fa-right-from-bracket"></i><span>Cerrar sesión</span>
        </button>
      </div>
    </aside>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="contenido-principal">

      <header class="header-pagina">
        <div class="titulo-pagina">
          <button class="boton-menu-movil" id="boton-menu-movil" aria-label="Abrir menú">
            <i class="fa-solid fa-bars"></i>
          </button>
          <h1>Soporte en vivo</h1>
        </div>
        <div class="header-acciones">
          <button class="boton-secundario boton-sm" id="boton-limpiar-chat">
            <i class="fa-solid fa-trash-can"></i> Limpiar chat
          </button>
        </div>
      </header>

      <div class="pagina-scroll" style="padding-bottom:0;">
        <div class="chat-contenedor">

          <!-- Info del agente -->
          <div class="info-agente">
            <div class="avatar-chat soporte" style="width:40px;height:40px;">
              <i class="fa-solid fa-headset" style="font-size:18px;"></i>
            </div>
            <div>
              <div style="font-size:14px;font-weight:600;color:var(--texto-principal);">Soporte ClientePortal</div>
              <div class="agente-estado">En línea — respuesta inmediata</div>
            </div>
          </div>

          <!-- Mensajes -->
          <div class="chat-mensajes" id="zona-mensajes" aria-live="polite"></div>

          <!-- Indicador escribiendo -->
          <div class="escribiendo" id="indicador-escribiendo" style="margin:0 24px 8px;">
            <span>Soporte está escribiendo</span>
            <div class="puntos-escritura">
              <span></span><span></span><span></span>
            </div>
          </div>

          <!-- Sugerencias -->
          <div class="sugerencias-rapidas">
            <span style="font-size:11px;color:var(--texto-suave);align-self:center;">Frecuentes:</span>
            <button class="sugerencia" data-texto="¿Cuál es el estado de mi factura pendiente?">Estado de factura</button>
            <button class="sugerencia" data-texto="¿Cuándo llega mi pedido?">Seguimiento de pedido</button>
            <button class="sugerencia" data-texto="Tengo un problema con mi cuenta">Problema con cuenta</button>
            <button class="sugerencia" data-texto="¿Cómo puedo solicitar un reembolso?">Solicitar reembolso</button>
          </div>

          <!-- Entrada del chat -->
          <div class="chat-entrada">
            <textarea id="campo-mensaje" class="textarea-mensaje" placeholder="Escribe tu mensaje..." rows="1" aria-label="Escribe tu mensaje"></textarea>
            <button class="boton-enviar" id="boton-enviar-mensaje" aria-label="Enviar mensaje">
              <i class="fa-solid fa-paper-plane"></i>
            </button>
          </div>

        </div>
      </div>
    </main>
  </div>

  <div id="contenedor-toast" aria-live="polite"></div>
  <script src="js/datos.js"></script>
  <script src="js/autenticacion.js"></script>
  <script src="js/chat.js"></script>
</body>
</html>
